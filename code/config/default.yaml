# Backbone
backbone:
  version: "dinov3"    # dinov2 | dinov3
  model: "large"       # dinov2: small/base/large/giant  dinov3: small/base/large/huge
  pretrained: true
  img_size: 224

# Prediction head
head:
  hidden_dim: 32
  dropout: 0.5

# Data
splits_dir: "/SAN/ioo/Alzeye10/yiqunlin/biomarker_regression/data/splits/alzeye"
train_csv_name: "train_healthy.csv" # default internal train split filename within splits_dir
val_csv_name: "val_healthy.csv"     # default internal val split filename within splits_dir
test_csv_name: "test.csv"   # optional: override test split filename within splits_dir
test_csv: ""           # optional: override test set CSV path (for external dataset evaluation)
test_name: ""          # optional: dataset name for output files (auto-derived from test_csv path if empty)
eval_output_suffix: "" # optional: append suffix to evaluation output filenames to avoid overwriting
biomarker_mean: 50
biomarker_std: 50

# Training
train_mode: "finetune_all"    # linear_probe | finetune_all | finetune_last_k
finetune_k: 4                 # last K backbone blocks to finetune (only for finetune_last_k)
batch_size: 32
epochs: 50
accum_iter: 1
lr: null
blr: 5e-3
min_lr: 1e-6
weight_decay: 0.05
layer_decay: 0.65
warmup_epochs: 10
clip_grad: 1.0

# Augmentation
color_jitter: null
aa: "rand-m9-mstd0.5-inc1"
reprob: 0.25
remode: "pixel"
recount: 1

# System
device: "cuda"
seed: 0
num_workers: 10
pin_mem: true

# Distributed
world_size: 1
local_rank: -1
dist_on_itp: false
dist_url: "env://"

# Experiment
exp_name: ""
output_dir: "./logs"
save_model: true
resume: ""
eval: false
dist_eval: false
start_epoch: 0

# Sampling
balanced_sampler: false       # if true, use WeightedRandomSampler with inverse-freq weights by age bin
balanced_bin_width: 5         # age bin width (years) for weight computation
balanced_min_count: 50        # clip per-bin count floor; bins with fewer samples treated as this many
